name: EL AL seat watcher

# Runs in GitHub's cloud on a schedule — nothing runs on anyone's computer.
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (UTC). 5 gateways x 14 dates = 70
                            # searches/run; hourly would exceed the free
                            # private-repo Actions budget. Edit to change.
  workflow_dispatch: {}       # adds a manual "Run workflow" button for testing

# Lets the run save its memory (state/seen.json) back to the repo so it
# doesn't re-alert the same flights on the next run.
permissions:
  contents: write

# If a run is still going when the next is due, let it finish first.
concurrency:
  group: seat-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # ---- What to search (edit these freely; not secret) ----
      # Tom is an unaccompanied minor and EL AL won't fly him on a connection,
      # so we watch NONSTOP EL AL flights to US gateways a parent can meet him
      # at, then fly on to Austin together.
      ORIGIN: TLV
      DESTINATIONS: "JFK,EWR,BOS,MIA,LAX"
      DATE_START: "2026-07-21"
      DATE_END: "2026-08-03"
      CURRENT_DEPARTURE_DATE: "2026-08-04"
      PASSENGERS: "1"
      # ---- Alert tuning ----
      MAX_STOPS: "0"          # nonstop only (a minor can't do connections)
      REQUIRE_ELAL: "true"    # only EL AL-operated flights
      # KEY LEVER: economy on these routes is sold out right now, so Google
      # hands back the ~$6k BUSINESS fare. A real economy seat prices ~$1-3k.
      # This ceiling drops the business fallbacks so the watcher stays quiet
      # until an actual economy seat opens, then alerts. Raise it if you think
      # a real economy fare could exceed it; keep it well under ~$6k.
      MAX_PRICE: "3500"
      TOP_PER_DATE: "3"
      PRICE_DROP_THRESHOLD: "150"
      PREFER_ELAL: "true"
      # ---- Email (address is not secret; the password is) ----
      NOTIFY_CHANNEL: email
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ozertom@gmail.com
      EMAIL_FROM: ozertom@gmail.com
      EMAIL_TO: ozertom@gmail.com,amitozer@gmail.com
      # The ONLY secret. Add it in: Settings → Secrets and variables → Actions.
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for earlier flights
        run: python -m src.monitor

      - name: Remember what we found
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name  "seat-watcher"
            git config user.email "actions@users.noreply.github.com"
            git add state/
            git commit -m "Update watcher memory [skip ci]"
            git push
          else
            echo "No change to watcher memory."
          fi
